<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipts — kstn Style</title>
  <meta name="description" content="Return-window tracker — albastyle.com/receipts">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="canonical" href="https://albastyle.com/receipts/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fbf3e4;
      --bg-warm: #f6e8cf;
      --paper: #fffaf0;
      --ink: #1f1108;
      --ink-soft: #6b4a2f;
      --ink-fade: #a08569;
      --accent: #f09618;
      --accent-deep: #c2410c;
      --chili: #c5342b;
      --olive: #7a9a2c;
      --rule: #e6d2b0;
      --rule-soft: rgba(111, 74, 47, 0.12);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background:
        radial-gradient(ellipse 65% 42% at 90% 5%, rgba(240, 150, 24, 0.14), transparent 60%),
        radial-gradient(ellipse 55% 40% at 5% 95%, rgba(240, 150, 24, 0.08), transparent 60%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-warm) 100%);
      min-height: 100vh;
    }
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 4rem 1.75rem 6rem;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent-deep);
      margin: 0 0 1.25rem;
    }
    .eyebrow::before {
      content: "";
      width: 28px;
      height: 1px;
      background: var(--accent-deep);
    }
    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 300;
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      line-height: 1.02;
      letter-spacing: -0.035em;
      margin: 0 0 0.75rem;
    }
    h1 em {
      font-style: italic;
      font-weight: 500;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-deep) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .lede {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 300;
      font-style: italic;
      font-size: 1.15rem;
      color: var(--ink-soft);
      margin: 0 0 2.5rem;
      max-width: 52ch;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin: 0 0 3rem;
    }
    .stat {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 14px;
      padding: 1.25rem 1.4rem;
    }
    .stat-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-fade);
    }
    .stat-value {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 400;
      font-size: 1.9rem;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-top: 0.25rem;
    }
    .stat-value.green { color: var(--olive); }
    .section {
      margin-top: 2.5rem;
    }
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 0.25rem;
    }
    .section-title {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 400;
      font-size: 1.5rem;
      letter-spacing: -0.015em;
      margin: 0;
    }
    .section-title em {
      font-style: italic;
      color: var(--accent-deep);
    }
    .section-count {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-fade);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem 1.5rem;
      padding: 1.1rem 0;
      border-bottom: 1px solid var(--rule-soft);
      align-items: baseline;
    }
    .row:last-child { border-bottom: none; }
    .row .merchant {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 500;
      font-size: 1.2rem;
      letter-spacing: -0.01em;
      margin: 0;
    }
    .merchant-link {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s ease;
    }
    .merchant-link:hover { border-bottom-color: var(--accent-deep); }
    .policy-wrap {
      font-family: "Inter", sans-serif;
      font-weight: 400;
      font-size: 0.78rem;
      color: var(--ink-fade);
      margin-left: 0.5rem;
    }
    .policy-link {
      color: var(--ink-fade);
      text-decoration: none;
      border-bottom: 1px dotted var(--ink-fade);
    }
    .policy-link:hover { color: var(--accent-deep); border-bottom-color: var(--accent-deep); }
    .row .items {
      font-size: 0.9rem;
      color: var(--ink-soft);
      margin-top: 0.15rem;
    }
    .row .restrictions {
      font-size: 0.78rem;
      color: var(--ink-fade);
      font-style: italic;
      margin-top: 0.3rem;
    }
    .row .right {
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.3rem;
    }
    .row .total {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 500;
      font-size: 1.1rem;
      letter-spacing: -0.01em;
    }
    .badge {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .badge.soon { background: rgba(197, 52, 43, 0.1); color: var(--chili); border-color: rgba(197, 52, 43, 0.3); }
    .badge.near { background: rgba(240, 150, 24, 0.15); color: var(--accent-deep); border-color: rgba(240, 150, 24, 0.4); }
    .badge.ok { background: rgba(122, 154, 44, 0.12); color: var(--olive); border-color: rgba(122, 154, 44, 0.3); }
    .badge.neutral { background: rgba(111, 74, 47, 0.08); color: var(--ink-soft); border-color: rgba(111, 74, 47, 0.2); }
    .badge.muted { background: transparent; color: var(--ink-fade); border-color: var(--rule); }
    .empty {
      padding: 2rem 0;
      color: var(--ink-fade);
      font-style: italic;
      font-family: "Fraunces", Georgia, serif;
    }
    .status-line {
      font-size: 0.85rem;
      color: var(--ink-fade);
      margin-top: 0.5rem;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--rule);
      font-size: 0.85rem;
      color: var(--ink-fade);
    }
    .toolbar a {
      color: var(--accent-deep);
      text-decoration: none;
      font-weight: 500;
    }
    .toolbar a:hover { text-decoration: underline; }
    .error-box {
      background: rgba(197, 52, 43, 0.08);
      border: 1px solid rgba(197, 52, 43, 0.25);
      color: var(--chili);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin: 2rem 0;
      font-size: 0.92rem;
    }
    .loading {
      color: var(--ink-fade);
      font-style: italic;
      font-family: "Fraunces", Georgia, serif;
      padding: 2rem 0;
    }
    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
      .row .right { align-items: flex-start; text-align: left; flex-direction: row; flex-wrap: wrap; gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <span data-site-version style="display:none;">v260418.05 11:45p</span>
  <main>
    <p class="eyebrow">Members · Receipts</p>
    <h1>Your return <em>clock</em>,<br>at a glance.</h1>
    <p class="lede">
      Every physical-goods receipt the watcher has captured from Gmail, sorted
      by how much time you have left to send it back.
    </p>

    <div id="content">
      <p class="loading">Loading receipts…</p>
    </div>

    <div class="toolbar">
      <span id="viewer"></span>
      <span><a href="/">← kstn Style</a> · <a href="/auth/logout">Sign out</a></span>
    </div>
  </main>

  <script>
    (async function () {
      const content = document.getElementById("content");
      const viewerEl = document.getElementById("viewer");

      let data;
      try {
        const res = await fetch("/api/receipts", { credentials: "same-origin" });
        if (res.status === 401) {
          location.href = "/auth/login?redirect=" + encodeURIComponent(location.pathname);
          return;
        }
        if (!res.ok) {
          throw new Error(`status ${res.status}`);
        }
        data = await res.json();
      } catch (e) {
        content.innerHTML = '<div class="error-box">Could not load receipts: ' + escapeHtml(e.message) + '</div>';
        return;
      }

      viewerEl.textContent = "Signed in as " + (data.viewer || "—");
      renderReceipts(content, data.receipts || []);
    })();

    function escapeHtml(s) {
      if (s == null) return "";
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function fmtMoney(n, currency) {
      if (n == null || isNaN(n)) return "—";
      const cur = currency || "USD";
      try {
        return new Intl.NumberFormat("en-US", { style: "currency", currency: cur }).format(Number(n));
      } catch {
        return `${cur} ${Number(n).toFixed(2)}`;
      }
    }

    function itemsPreview(items) {
      if (!items || !items.length) return '<span class="items"><em>no items captured</em></span>';
      const names = items.map((i) => i.name).filter(Boolean);
      const shown = names.slice(0, 3).map(escapeHtml).join(", ");
      const extra = names.length - 3;
      return '<div class="items">' + shown + (extra > 0 ? ` <span style="color:#a08569">+${extra} more</span>` : "") + "</div>";
    }

    function daysBetween(dateStr, today) {
      const d = new Date(dateStr + "T00:00:00");
      return Math.round((d - today) / (1000 * 60 * 60 * 24));
    }

    function badgeForDays(days) {
      if (days <= 1) return `<span class="badge soon">${days}d left</span>`;
      if (days <= 7) return `<span class="badge near">${days}d left</span>`;
      if (days <= 30) return `<span class="badge ok">${days}d left</span>`;
      return `<span class="badge muted">${days}d</span>`;
    }

    function merchantLabel(r) {
      const name = escapeHtml(r.merchant_name || "Unknown");
      if (r.merchant_website) {
        return `<a class="merchant-link" href="${escapeHtml(r.merchant_website)}" target="_blank" rel="noopener noreferrer">${name}</a>`;
      }
      return name;
    }

    function renderRow(r, rightHtml) {
      const restrictions = (r.restrictions && r.restrictions.length)
        ? '<div class="restrictions">' + r.restrictions.map(escapeHtml).join(" · ") + "</div>"
        : "";
      const policyLink = r.store_policy_url
        ? ` · <a class="policy-link" href="${escapeHtml(r.store_policy_url)}" target="_blank" rel="noopener noreferrer">policy</a>`
        : "";
      return `
        <div class="row">
          <div>
            <div class="merchant">${merchantLabel(r)}${policyLink ? `<span class="policy-wrap">${policyLink}</span>` : ""}</div>
            ${itemsPreview(r.items)}
            ${restrictions}
          </div>
          <div class="right">
            <div class="total">${fmtMoney(r.total, r.currency)}</div>
            ${rightHtml}
          </div>
        </div>
      `;
    }

    function renderReceipts(container, receipts) {
      const active = [];
      const returned = [];
      const expired = [];
      const noDeadline = [];

      for (const r of receipts) {
        switch (r.effective_status) {
          case "returned": returned.push(r); break;
          case "expired": expired.push(r); break;
          case "no_deadline": noDeadline.push(r); break;
          default: active.push(r);
        }
      }

      active.sort((a, b) => (a.days_to_return_deadline ?? 9999) - (b.days_to_return_deadline ?? 9999));
      expired.sort((a, b) => new Date(b.return_by) - new Date(a.return_by));

      const lifetime = receipts.reduce((s, r) => s + (Number(r.total) || 0), 0);

      const parts = [];

      parts.push(`
        <div class="stats">
          <div class="stat">
            <div class="stat-label">Lifetime spend</div>
            <div class="stat-value">${fmtMoney(lifetime, "USD")}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Total receipts</div>
            <div class="stat-value">${receipts.length}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Active windows</div>
            <div class="stat-value green">${active.length}</div>
          </div>
        </div>
      `);

      if (!receipts.length) {
        parts.push('<p class="empty">Nothing here yet — the watcher hasn\'t captured any receipts.</p>');
        container.innerHTML = parts.join("");
        return;
      }

      function section(title, emphasis, rows, emptyText) {
        const headline = title.replace(emphasis, `<em>${emphasis}</em>`);
        const body = rows.length
          ? rows.join("")
          : `<p class="empty">${emptyText}</p>`;
        return `
          <section class="section">
            <div class="section-head">
              <h2 class="section-title">${headline}</h2>
              <span class="section-count">${rows.length}</span>
            </div>
            ${body}
          </section>
        `;
      }

      parts.push(section(
        "Active windows",
        "Active",
        active.map((r) => {
          const days = r.days_to_return_deadline;
          return renderRow(r, `<div>${badgeForDays(days)}</div><div style="color:#a08569;font-size:0.78rem">by ${escapeHtml(r.return_by)}</div>`);
        }),
        "Nothing currently returnable."
      ));

      parts.push(section(
        "Policy unclear",
        "unclear",
        noDeadline.map((r) => renderRow(r, `<span class="badge near">verify</span>`)),
        "All captured receipts have a known policy."
      ));

      parts.push(section(
        "Returned",
        "Returned",
        returned.map((r) => renderRow(r, `<span class="badge ok">returned ${escapeHtml(r.latest_refunded_on || "")}</span>`)),
        "Nothing returned yet."
      ));

      const expiredShown = expired.slice(0, 30);
      parts.push(section(
        "Past the window",
        "Past",
        expiredShown.map((r) => renderRow(r, `<span class="badge muted">expired ${escapeHtml(r.return_by)}</span>`)),
        "Nothing expired."
      ));
      if (expired.length > expiredShown.length) {
        parts.push(`<p class="status-line">+${expired.length - expiredShown.length} older expired not shown.</p>`);
      }

      container.innerHTML = parts.join("");
    }
  </script>
</body>
</html>
